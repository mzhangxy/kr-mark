name: Weirdhost Auto Renewal

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '0 10 * * *' # 每天北京时间 18:00 运行 (UTC 10:00)

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          # 执行 seleniumbase 的驱动安装命令，这是 uc 模式运行的关键
          sbase install chromedriver

      - name: Run Renewal Script
        env:
          # 基础配置
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          REMEMBER_WEB_COOKIE: ${{ secrets.REMEMBER_WEB_COOKIE }}
          WEIRDHOST_SERVER_URLS: ${{ secrets.WEIRDHOST_SERVER_URLS }}
          
          # Telegram 通知配置
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          
          # 如果你的脚本需要 Searcade 的账号密码也可以配置在这里
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: python main.py

      - name: Upload Debug Screenshots
        if: always() # 无论成功还是失败都上传截图用于调试
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            session_cookie.txt
          retention-days: 3
