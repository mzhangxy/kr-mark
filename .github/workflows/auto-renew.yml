name: Weirdhost Ultimate Auto Renewal

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 */2 * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable unzip xvfb libnss3 # 核心依赖

      - name: Install Python Dependencies
        run: |
          pip install seleniumbase requests
          sbase install chromedriver

      - name: Setup Xray Proxy
        # ... 这里保持你原来的 Xray 设置逻辑不变 ...

      - name: Run Renewal Script
        env:
          TWOCAPTCHA_API_KEY:     ${{ secrets.TWOCAPTCHA_API_KEY }}
          REMEMBER_WEB_COOKIE:    ${{ secrets.REMEMBER_WEB_COOKIE }}
          WEIRDHOST_SERVER_URLS:  ${{ secrets.WEIRDHOST_SERVER_URLS }}
          TG_BOT_TOKEN:           ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:             ${{ secrets.TG_CHAT_ID }}
        run: |
          # 关键：开启 1080P 虚拟桌面，确保点击坐标精准
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 5
          python main.py
