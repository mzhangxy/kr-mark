name: Weirdhost Ultimate Auto Renewal

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 */2 * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable unzip xvfb libnss3 libatk-bridge2.0-0

      - name: Install Python Dependencies
        run: |
          pip install seleniumbase requests
          sbase install chromedriver

      # --- 这里请保留您原来的 Xray Proxy 设置步骤 ---
      # 注意：确保这一步的缩进与上面的 steps 对齐

      - name: Run Renewal Script
        env:
          TWOCAPTCHA_API_KEY:     ${{ secrets.TWOCAPTCHA_API_KEY }}
          REMEMBER_WEB_COOKIE:    ${{ secrets.REMEMBER_WEB_COOKIE }}
          WEIRDHOST_SERVER_URLS:  ${{ secrets.WEIRDHOST_SERVER_URLS }}
          TG_BOT_TOKEN:           ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:             ${{ secrets.TG_CHAT_ID }}
        run: |
          export DISPLAY=:99
          # 启动虚拟显示并确保它在后台运行
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          sleep 5
          python main.py
