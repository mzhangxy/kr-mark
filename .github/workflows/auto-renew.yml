name: Weirdhost Auto Renew

on:
  schedule:
    - cron: '0 17 */2 * *'  # 每2天运行
  workflow_dispatch:     # 允许手动触发

jobs:
  login-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        # 🟢 增加安装 requests 库，用于连接 2captcha API
        pip install playwright requests
        playwright install chromium
          
    - name: Set up WARP
      uses: fscarmen/warp-on-actions@v1.4
      with:
        stack: dual
        mode: wireguard
      
    - name: Run auto renewal
      env:
        REMEMBER_WEB_COOKIE: ${{ secrets.REMEMBER_WEB_COOKIE }}
        #WEIRDHOST_EMAIL: ${{ secrets.WEIRDHOST_EMAIL }}
        #WEIRDHOST_PASSWORD: ${{ secrets.WEIRDHOST_PASSWORD }}
        WEIRDHOST_SERVER_URLS: ${{ secrets.WEIRDHOST_SERVER_URLS }}
        # 🟢 必须在这里添加这个环境变量，脚本才能读取到 2captcha 的 KEY
        TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
      
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-screenshots
        path: ./*.png
    
